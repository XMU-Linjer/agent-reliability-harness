id: normal_agent_run
name: 正常 Agent 运行
description: >
  Agent 正常完成任务，无故障注入，所有策略通过。
  验证基线行为：mock provider 返回预设响应，工具全部为 safe 级别，
  token 在预算内，最终正常结束。

agent_run:
  model: gpt-4o
  provider: mock
  tools:
    - read_file
    - search_web
  max_steps: 5
  task: "读取 config.yaml 并返回其中的 database host 字段"
  mock_responses:
    - content: "我需要先读取 config.yaml 文件"
      tool_calls:
        - tool: read_file
          arguments:
            path: config.yaml
      total_tokens: 150
    - content: "database host 是 localhost:5432"
      finish_reason: stop
      total_tokens: 80

policy:
  allowed_models:
    - gpt-4o
    - claude-3-sonnet
  max_token_budget: 10000
  max_tool_risk_level: low
  require_answer_verification: false

expected_failure: none
expected_events:
  - agent_start
  - llm_request
  - llm_response
  - tool_call
  - tool_result
  - llm_request
  - llm_response
  - agent_end
pass_criteria: "Agent 正常完成任务，trace 中无 deny 决策，无故障事件，步数 <= max_steps"
