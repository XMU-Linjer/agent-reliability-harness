id: bad_tool_arguments
name: 工具参数被篡改
description: >
  FaultInjector 将 read_file 的参数篡改为无效值（path = null）。
  Fake tool 返回参数校验错误。验证系统能检测和处理格式错误的工具参数。

agent_run:
  model: gpt-4o
  provider: mock
  tools:
    - read_file
  max_steps: 3
  task: "读取 config.yaml 文件内容"
  mock_responses:
    - content: "我需要读取 config.yaml"
      tool_calls:
        - tool: read_file
          arguments:
            path: config.yaml
      total_tokens: 100

policy:
  allowed_models:
    - gpt-4o
  max_token_budget: 5000
  max_tool_risk_level: low
  require_answer_verification: false

fault_injection:
  type: bad_args
  target: read_file
  payload:
    arguments:
      path: null

expected_failure: invalid_arguments
expected_events:
  - agent_start
  - llm_request
  - llm_response
  - tool_call
  - fault_injected
  - tool_result
  - agent_end
pass_criteria: "FaultInjector 将 read_file 参数篡改为 {path: null}；Fake tool 返回参数校验错误；failure_type = invalid_arguments"
