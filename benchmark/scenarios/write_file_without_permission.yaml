id: write_file_without_permission
name: 写文件工具未授权
description: >
  Agent 尝试调用 write_file 工具，但 PolicySpec.allowed_tools 只允许
  read_file 和 search_web。ToolFirewall 应拦截该调用，返回 permission_denied。

agent_run:
  model: gpt-4o
  provider: mock
  tools:
    - read_file
    - search_web
    - write_file
  max_steps: 3
  task: "读取 config.yaml 并将内容写入 output.txt"
  mock_responses:
    - content: "我先读取 config.yaml"
      tool_calls:
        - tool: read_file
          arguments:
            path: config.yaml
      total_tokens: 100
    - content: "现在将内容写入 output.txt"
      tool_calls:
        - tool: write_file
          arguments:
            path: output.txt
            content: "key: value"
      total_tokens: 120

policy:
  allowed_models:
    - gpt-4o
  max_token_budget: 5000
  max_tool_risk_level: high
  allowed_tools:
    - read_file
    - search_web
  require_answer_verification: false

expected_failure: permission_denied
expected_events:
  - agent_start
  - llm_request
  - llm_response
  - tool_call
  - tool_result
  - llm_request
  - llm_response
  - firewall_check
  - firewall_decision
  - agent_end
pass_criteria: "ToolFirewall 拦截 write_file 调用，因为它不在 allowed_tools 列表中，工具未实际执行"
